# Test shortcuts. Each per-package alias runs cargo-nextest on ONLY that
# crate (plus the deps it needs to compile), so the TDD red→green loop never
# rebuilds and re-runs the whole workspace.
#
#   cargo tc   → newtua-common
#   cargo td   → newtua-dos
#   cargo tm   → newtua-mac
#   cargo ta   → newtua-amiga
#   cargo tz   → newtua-alz
#   cargo tu   → newtua-testutil
#   cargo tw   → whole workspace (the final Definition-of-Done sweep)
#
# Append any nextest flags as usual, e.g. `cargo td decode_one` to filter.
#
# While only fixing compile errors (not yet ready to RUN a test), use the
# check-only aliases: they type-check the crate and SKIP codegen + linking, so
# they finish far faster than building a test binary. Switch to `cargo td` only
# when you actually need to observe a test go red/green.
#
#   cargo kc / kd / km / ka / kz → clippy on common / dos / mac / amiga / alz (compile check only)
[alias]
tc = "nextest run -p newtua-common"
td = "nextest run -p newtua-dos"
tm = "nextest run -p newtua-mac"
ta = "nextest run -p newtua-amiga"
tz = "nextest run -p newtua-alz"
tu = "nextest run -p newtua-testutil"
tw = "nextest run --workspace"
kc = "clippy -p newtua-common --all-targets"
kd = "clippy -p newtua-dos --all-targets"
km = "clippy -p newtua-mac --all-targets"
ka = "clippy -p newtua-amiga --all-targets"
kz = "clippy -p newtua-alz --all-targets"
