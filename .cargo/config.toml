# Test shortcuts. Each per-package alias runs cargo-nextest on ONLY that
# crate (plus the deps it needs to compile), so the TDD red→green loop never
# rebuilds and re-runs the whole workspace.
#
#   cargo tc   → newtua-common
#   cargo td   → newtua-dos
#   cargo ta   → newtua-amiga
#   cargo tu   → newtua-testutil
#   cargo tw   → whole workspace (the final Definition-of-Done sweep)
#
# Append any nextest flags as usual, e.g. `cargo td decode_one` to filter.
[alias]
tc = "nextest run -p newtua-common"
td = "nextest run -p newtua-dos"
ta = "nextest run -p newtua-amiga"
tu = "nextest run -p newtua-testutil"
tw = "nextest run --workspace"
